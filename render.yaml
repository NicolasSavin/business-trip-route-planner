services:
  - type: web
    name: business-trip-route-planner-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FRONTEND_HOSTNAME
        fromService:
          type: web
          name: business-trip-route-planner-frontend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: PLAYWRIGHT_ENABLED
        value: false
      - key: TUTU_PLAYWRIGHT_ENABLED
        value: false
      - key: PLAYWRIGHT_LAZY_START
        value: true
      - key: BROWSER_IDLE_TIMEOUT_SECONDS
        value: 120
      - key: BROWSER_POOL_SIZE
        value: 1
      - key: YANDEX_STATIONS_LAZY_LOAD
        value: true
      - key: YANDEX_STATIONS_STORAGE
        value: sqlite
      - key: YANDEX_STATIONS_AUTO_SYNC
        value: false
      - key: MAX_PROVIDER_CONCURRENCY
        value: 2
      - key: MAX_AVAILABILITY_CHECKS_PER_QUERY
        value: 10
      - key: BROWSER_HEADLESS
        value: true
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.cache/ms-playwright

  - type: web
    name: business-trip-route-planner-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_HOSTNAME
        fromService:
          type: web
          name: business-trip-route-planner-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: NODE_VERSION
        value: 20
